# 标题名和URL
site_name: OOP Note             
site_url: http://127.0.0.1:8000/

# 主题
theme:
  name: material # mkdocs-material
  language: zh
  favicon: favicon.png               
  # 明暗主题切换
  palette:                        
    - media: "(prefers-color-scheme: light)"
      scheme: default # 浅色主题方案
      primary: black              # 主色调:导航栏底色等
      accent: black               # 强调色:链接,悬浮
      toggle:                     # 切换按钮图标与提示
        icon: material/brightness-7
        name: Switch to dark mode

    # 深色模式设置（系统偏好为 dark 时激活）
    - media: "(prefers-color-scheme: dark)"
      scheme: slate               
      primary: black             
      accent: black               
      toggle:                    
        icon: material/brightness-4
        name: Switch to bright mode
  # 高级交互特性
  features:                       
    - navigation.instant          # 开启即时页面加载
    - navigation.instant.prefetch # 开启预加载

# CSS引入
extra_css:                        
  - stylesheets/extra.css       #自定义排版  

# JS引入
extra_javascript:               
  - javascripts/mathjax.js        # MathJax数学公式渲染
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

# markdown解析器插件扩展
markdown_extensions:              
  - pymdownx.arithmatex:          # 支持数学公式渲染
      generic: true               
  - admonition                    # 支持警告/提示框语法如 `!!! note`
  - pymdownx.details              # 支持可折叠块
  - pymdownx.superfences:         # 允许代码嵌套
      custom_fences:              # 自定义代码块围栏
        - name: mermaid           # 支持mermaid绘图
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:           # 代码高亮及行号配置
      anchor_linenums: true       # 允许点击代码的行号来生成锚点链接
      line_spans: __span          # 为每行代码包裹 span 标签，方便用 CSS 做精细的行样式调整
      pygments_lang_class: true   # 为代码块自动添加对应的 Pygments 语言 Class 类名
  - pymdownx.inlinehilite         # 支持行内代码的高亮显示，例如 `python import os`
  - pymdownx.snippets             # 支持在 Markdown 中嵌入其他 Markdown 或文件的片段（复用内容）
  - pymdownx.critic               # 支持 CriticMarkup 语法，用于显示文档的修订改动
  - pymdownx.caret                # 支持上标（如 `x^2^`）和下划线（如 `^^inserted^^`）语法
  - pymdownx.keys                 # 支持键盘按键的优雅排版效果，例如 `++ctrl+alt+del++`
  - pymdownx.mark                 # 支持文本高亮（荧光笔效果），例如 `==highlight==`
  - pymdownx.tilde                # 支持下标语法，例如 `H~2~O`

# 导航目录
nav:                              
  - 目录: index.md
  - 导论: Introduction.md
  - 使用类与对象: Using_Objects.md
  - 类与封装: Class.md
  - 构造、清理与对象交互: Object_Interactive.md
  - 拷贝构造、静态成员与命名空间: Copy_constructor.md
  - 内联函数、对象组合与继承基础: Inheritance.md
  - 多态: Polymorphism.md
  - 运算符重载与类型转换: Overloaded_Operators.md
  - 异常处理: Exceptions.md
  - 模板: Template.md
  - 迭代器: Iterators.md
  - 程序设计/架构设计: Design.md
  - 设计模式: Patterns_Design-Case_Study.md
